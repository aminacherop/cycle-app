<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Primary Meta -->
    <title>CycleApp — Period Tracker</title>
    <meta name="description" content="Private period tracker built for Kenyan women. Track your cycle, symptoms, mood and fertility. Works offline." />
    <meta name="keywords" content="period tracker,  menstrual cycle, fertility, PCOS, ovulation tracker" />
    <meta name="author" content="CycleApp Kenya" />
    <meta name="theme-color" content="#C2527A" />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CycleApp" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" href="/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CycleApp — Period Tracker" />
    <meta property="og:description" content="Private period tracker built for women. Free, offline-first, and designed around your body." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:url" content="https://cycleapp.co.ke" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="CycleApp — Period Tracker" />
    <meta name="twitter:description" content="Private period tracker built for women." />
    <meta name="twitter:image" content="/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent flash of unstyled content -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #FFF6F9;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }

      /* Splash screen shown before React loads */
      #splash {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #FFF6F9;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 16px;
        transition: opacity 0.4s ease;
      }

      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #splash-icon {
        font-size: 72px;
        animation: splashPulse 1.6s ease-in-out infinite;
      }

      #splash-title {
        font-size: 26px;
        font-weight: 700;
        color: #C2527A;
        letter-spacing: -0.5px;
        margin: 0;
      }

      #splash-sub {
        font-size: 13px;
        color: #9CA3AF;
        margin: 0;
      }

      #splash-dots {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }

      .splash-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #EAA8BC;
        animation: dotBounce 1.2s ease-in-out infinite;
      }

      .splash-dot:nth-child(2) { animation-delay: 0.15s; }
      .splash-dot:nth-child(3) { animation-delay: 0.3s; }

      @keyframes splashPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }

      @keyframes dotBounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
        40% { transform: translateY(-6px); opacity: 1; }
      }

      /* Dark mode splash */
      @media (prefers-color-scheme: dark) {
        html, body { background: #0F0A0C; }
        #splash { background: #0F0A0C; }
        #splash-sub { color: #6B7280; }
      }
    </style>
  </head>

  <body>

    <!-- Splash screen — shown instantly before JS loads -->
    <div id="splash">
      <div id="splash-icon">🌸</div>
      <p id="splash-title">CycleApp</p>
      <p id="splash-sub">Period tracker</p>
      <div id="splash-dots">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>

    <!-- React root -->
    <div id="root"></div>

    <!-- Hide splash once React is ready -->
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash')
          if (splash) {
            splash.classList.add('hidden')
            setTimeout(() => splash.remove(), 400)
          }
        }, 1200)
      })
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
